<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#79c0ff"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#56d364"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
  <!-- T glyph: top bar + stem -->
  <rect x="14" y="18" width="36" height="7" rx="1.5" fill="url(#t)"/>
  <rect x="28.5" y="18" width="7" height="32" rx="1.5" fill="url(#t)"/>
  <!-- Accent dot -->
  <circle cx="48" cy="48" r="5.5" fill="url(#dot)"/>
  <circle cx="48" cy="48" r="5.5" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.6"/>
</svg>
